<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Meine Rezepte</title>
<style>
  :root {
    --olive: #4A5D3A;
    --olive-light: #6B7F5A;
    --olive-pale: #EBF0E6;
    --cream: #F7F5F0;
    --terra: #C8623A;
    --terra-light: #E8846A;
    --brown: #2C1810;
    --gray: #8A8A7A;
    --gray-light: #E8E4DC;
    --white: #FFFFFF;
    --red: #D64040;
    --yellow: #E8A830;
    --radius: 14px;
    --shadow: 0 2px 12px rgba(44,24,16,0.10);
    --shadow-lg: 0 6px 28px rgba(44,24,16,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--cream);
    color: var(--brown);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    overflow-x: hidden;
  }

  /* ── TOP BAR ── */
  .topbar {
    background: var(--olive);
    color: var(--white);
    padding: 16px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .topbar h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.01em; flex: 1; }
  .topbar .icon-btn {
    background: rgba(255,255,255,0.18);
    border: none;
    color: white;
    width: 36px; height: 36px;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── TABS ── */
  .tabs {
    position: fixed;
    bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: var(--white);
    border-top: 1.5px solid var(--gray-light);
    display: flex;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .tab-btn {
    flex: 1;
    border: none;
    background: transparent;
    padding: 10px 4px 8px;
    cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    color: var(--gray);
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .tab-btn .tab-icon { font-size: 1.35rem; }
  .tab-btn.active { color: var(--olive); }
  .tab-btn.active .tab-icon { transform: scale(1.1); }

  /* ── PAGES ── */
  .page { display: none; padding: 16px 16px 90px; overflow: visible; }
  .page.active { display: block; }

  /* ── CARDS ── */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 12px;
    overflow: hidden;
  }
  .card-body { padding: 14px 16px; }
  .card-title { font-size: 1rem; font-weight: 700; margin-bottom: 3px; }
  .card-sub { font-size: 0.78rem; color: var(--gray); }

  /* ── FAB ── */
  .fab {
    position: fixed;
    bottom: 72px; right: 20px;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--terra);
    color: white;
    font-size: 1.6rem;
    border: none;
    box-shadow: var(--shadow-lg);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 90;
    transition: background 0.2s, transform 0.15s;
  }
  .fab:active { transform: scale(0.93); background: var(--terra-light); }

  /* ── SEARCH ── */
  .search-bar {
    background: var(--white);
    border: 1.5px solid var(--gray-light);
    border-radius: 10px;
    padding: 10px 14px;
    width: 100%;
    font-size: 0.95rem;
    color: var(--brown);
    outline: none;
    margin-bottom: 14px;
  }
  .search-bar:focus { border-color: var(--olive); }

  /* ── RECIPE THUMB ── */
  .recipe-thumb {
    width: 100%; height: 150px;
    object-fit: cover;
    background: var(--olive-pale);
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem;
    color: var(--olive-light);
  }
  .recipe-thumb img { width: 100%; height: 150px; object-fit: cover; display: block; }
  .recipe-card-body { padding: 12px 14px; }
  .recipe-card-body .card-title { margin-bottom: 6px; }
  .recipe-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; }
  .badge {
    background: var(--olive-pale);
    color: var(--olive);
    border-radius: 20px;
    padding: 2px 9px;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .badge.terra { background: #FCE9E2; color: var(--terra); }

  /* ── SECTION TITLE ── */
  .section-title {
    font-size: 0.7rem;
    font-weight: 800;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--gray);
    margin: 18px 0 8px;
  }
  .section-title:first-child { margin-top: 0; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(44,24,16,0.45);
    z-index: 200;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--white);
    border-radius: 22px 22px 0 0;
    width: 100%; max-width: 480px;
    max-height: 92vh;
    overflow-y: auto;
    padding: 0 0 env(safe-area-inset-bottom);
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle {
    width: 40px; height: 4px;
    background: var(--gray-light);
    border-radius: 4px;
    margin: 10px auto 0;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px 10px;
    border-bottom: 1px solid var(--gray-light);
    position: sticky; top: 0; background: var(--white); z-index: 1;
  }
  .modal-header h2 { font-size: 1.05rem; font-weight: 800; }
  .modal-close {
    background: var(--gray-light);
    border: none;
    border-radius: 50%;
    width: 30px; height: 30px;
    font-size: 0.85rem;
    cursor: pointer;
    color: var(--brown);
    display: flex; align-items: center; justify-content: center;
  }
  .modal-body { padding: 14px 18px 20px; }

  /* ── FORM ELEMENTS ── */
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 0.78rem; font-weight: 700; color: var(--gray); letter-spacing: 0.03em; text-transform: uppercase; margin-bottom: 5px; display: block; }
  .form-input, .form-textarea, .form-select {
    width: 100%;
    border: 1.5px solid var(--gray-light);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 0.92rem;
    color: var(--brown);
    background: var(--white);
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--olive); }
  .form-textarea { resize: vertical; min-height: 90px; }
  .form-row { display: flex; gap: 8px; }
  .form-row .form-group { flex: 1; }

  /* ── BUTTONS ── */
  .btn {
    border: none; border-radius: 10px;
    padding: 12px 18px; font-size: 0.9rem; font-weight: 700;
    cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
    font-family: inherit; transition: opacity 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); opacity: 0.85; }
  .btn-primary { background: var(--olive); color: white; width: 100%; justify-content: center; }
  .btn-terra { background: var(--terra); color: white; width: 100%; justify-content: center; }
  .btn-ghost { background: transparent; color: var(--gray); border: 1.5px solid var(--gray-light); }
  .btn-danger { background: #FCE8E8; color: var(--red); }
  .btn-small { padding: 6px 11px; font-size: 0.78rem; border-radius: 8px; }

  /* ── INGREDIENT ROW ── */
  .ing-row { display: flex; gap: 6px; margin-bottom: 7px; align-items: flex-end; }
  .ing-row .form-group { margin-bottom: 0; }
  .ing-row .name-col { flex: 3; position: relative; }
  .ing-row .amt-col { flex: 2; }
  .ing-row .unit-col { flex: 2; }
  .ing-row .del-col { flex: 0 0 34px; }
  .ing-row .add-col { flex: 0 0 34px; }
  .del-btn {
    background: #FCE8E8; color: var(--red);
    border: none; border-radius: 8px;
    width: 34px; height: 38px;
    cursor: pointer; font-size: 0.9rem;
    display: flex; align-items: center; justify-content: center;
  }
  .add-ing-btn {
    background: var(--olive-pale); color: var(--olive);
    border: none; border-radius: 8px;
    width: 34px; height: 38px;
    cursor: pointer; font-size: 1.2rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .add-row-btn {
    background: var(--olive-pale); color: var(--olive);
    border: none; border-radius: 8px;
    padding: 8px 14px; font-size: 0.82rem; font-weight: 700;
    cursor: pointer; margin-top: 4px; font-family: inherit;
  }
  .ing-row .autocomplete-list { top: 100%; z-index: 500; }

  /* ── PHOTO UPLOAD ── */
  .photo-zone {
    border: 2px dashed var(--gray-light);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    color: var(--gray);
    font-size: 0.85rem;
    margin-bottom: 6px;
    background: var(--cream);
    position: relative;
    overflow: hidden;
  }
  .photo-zone img { width: 100%; height: 130px; object-fit: cover; border-radius: 8px; display: block; }
  .photo-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .photo-zone-icon { font-size: 1.8rem; display: block; margin-bottom: 6px; }

  /* ── PANTRY ── */
  .pantry-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 16px;
    border-bottom: 1px solid var(--gray-light);
  }
  .pantry-item:last-child { border-bottom: none; }
  .pantry-name { font-size: 0.92rem; font-weight: 700; }
  .pantry-detail { font-size: 0.77rem; color: var(--gray); margin-top: 2px; }
  .pantry-right { text-align: right; }
  .pantry-qty { font-size: 0.9rem; font-weight: 700; color: var(--olive); }
  .expiry { font-size: 0.72rem; margin-top: 2px; }
  .expiry.ok { color: var(--olive-light); }
  .expiry.warn { color: var(--yellow); }
  .expiry.over { color: var(--red); }

  /* ── SHOPPING ── */
  .shopping-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 16px;
    border-bottom: 1px solid var(--gray-light);
    cursor: pointer;
    transition: background 0.15s;
  }
  .shopping-item:last-child { border-bottom: none; }
  .shopping-item:active { background: var(--cream); }
  .shopping-check {
    width: 22px; height: 22px; flex-shrink: 0;
    border: 2px solid var(--gray-light);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; color: transparent;
    transition: all 0.2s;
  }
  .shopping-item.checked .shopping-check {
    background: var(--olive); border-color: var(--olive); color: white;
  }
  .shopping-item.checked .shopping-name { text-decoration: line-through; color: var(--gray); }
  .shopping-name { flex: 1; font-size: 0.9rem; font-weight: 600; }
  .shopping-qty { font-size: 0.82rem; color: var(--gray); }

  .recipe-selector { margin-bottom: 16px; }
  .recipe-select-row {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    background: var(--white); border-radius: 10px; margin-bottom: 8px;
    box-shadow: var(--shadow);
  }
  .recipe-select-row label { flex: 1; font-size: 0.9rem; font-weight: 700; cursor: pointer; }
  .recipe-select-row input[type=number] {
    width: 56px; border: 1.5px solid var(--gray-light); border-radius: 8px;
    padding: 6px 8px; font-size: 0.85rem; text-align: center;
    color: var(--brown); outline: none;
  }
  .recipe-select-row input[type=checkbox] { accent-color: var(--olive); width: 18px; height: 18px; }

  /* ── RECIPE DETAIL ── */
  .step-item {
    display: flex; gap: 12px;
    margin-bottom: 14px;
  }
  .step-num {
    width: 26px; height: 26px; flex-shrink: 0;
    background: var(--olive); color: white;
    border-radius: 50%;
    font-size: 0.78rem; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    margin-top: 2px;
  }
  .step-text { font-size: 0.88rem; line-height: 1.5; color: var(--brown); }
  .ing-list-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-bottom: 1px solid var(--gray-light);
    font-size: 0.88rem;
  }
  .ing-list-item:last-child { border-bottom: none; }
  .ing-list-item .ing-name { font-weight: 600; }
  .ing-list-item .ing-amount { color: var(--gray); }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center; padding: 40px 20px; color: var(--gray);
  }
  .empty-icon { font-size: 3rem; margin-bottom: 10px; }
  .empty h3 { font-size: 1rem; font-weight: 700; color: var(--brown); margin-bottom: 6px; }
  .empty p { font-size: 0.82rem; line-height: 1.5; }

  /* ── TOAST ── */
  .toast {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%) translateY(-20px);
    background: var(--brown); color: white;
    border-radius: 20px; padding: 8px 18px; font-size: 0.85rem; font-weight: 600;
    z-index: 999; opacity: 0; transition: all 0.3s; white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Photo thumbnails */
  .photo-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .photo-thumb { width: 70px; height: 70px; border-radius: 8px; object-fit: cover; position: relative; display: inline-block; }
  .photo-thumb-wrap { position: relative; display: inline-block; }
  .photo-thumb-wrap .remove-photo {
    position: absolute; top: -5px; right: -5px;
    background: var(--red); color: white; border: none; border-radius: 50%;
    width: 18px; height: 18px; font-size: 0.65rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  .persons-ctrl { display: flex; align-items: center; gap: 10px; }
  .persons-ctrl button {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--olive-pale); color: var(--olive);
    border: none; font-size: 1.2rem; cursor: pointer; font-weight: 700;
  }
  .persons-val { font-size: 1rem; font-weight: 800; min-width: 24px; text-align: center; }


  /* ── AUTOCOMPLETE ── */
  .autocomplete-wrap { position: relative; }
  .autocomplete-list {
    position: absolute; top: 100%; left: 0; right: 0;
    background: var(--white);
    border: 1.5px solid var(--olive);
    border-radius: 10px;
    max-height: 220px;
    overflow-y: auto;
    z-index: 999;
    box-shadow: var(--shadow-lg);
    margin-top: 3px;
  }
  .autocomplete-item {
    padding: 11px 14px;
    cursor: pointer;
    font-size: 0.92rem;
    border-bottom: 1px solid var(--gray-light);
    display: flex; align-items: center; gap: 8px;
  }
  .autocomplete-item:last-child { border-bottom: none; }
  .autocomplete-item:active, .autocomplete-item.highlighted { background: var(--olive-pale); }
  .autocomplete-cat { font-size: 0.68rem; color: var(--gray); margin-left: auto; }
</style>
</head>
<body>

<div class="topbar">
  <h1 id="page-title">🌿 Meine Rezepte</h1>
</div>

<!-- PAGES -->
<div id="page-recipes" class="page active">
  <input class="search-bar" id="recipe-search" placeholder="🔍 Rezept suchen…" oninput="renderRecipes()">
  <div id="recipe-filters" style="display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:4px;scrollbar-width:none"></div>
  <div id="recipe-list"></div>
</div>

<div id="page-pantry" class="page">
  <input class="search-bar" id="pantry-search" placeholder="🔍 Vorrat suchen…" oninput="renderPantry()">
  <div id="pantry-list"></div>
</div>

<div id="page-shopping" class="page">
  <div id="shopping-content"></div>
</div>

<div id="page-foods" class="page">
  <div id="foods-content"></div>
</div>

<div id="page-discover" class="page">
  <div id="discover-content"></div>
</div>

<!-- BOTTOM TABS -->
<nav class="tabs">
  <button class="tab-btn active" onclick="switchPage('recipes', this)">
    <span class="tab-icon">🍳</span>Rezepte
  </button>
  <button class="tab-btn" onclick="switchPage('pantry', this)">
    <span class="tab-icon">🏠</span>Vorrat
  </button>
  <button class="tab-btn" onclick="switchPage('shopping', this)">
    <span class="tab-icon">🛒</span>Einkauf
  </button>
  <button class="tab-btn" onclick="switchPage('foods', this)">
    <span class="tab-icon">📋</span>Liste
  </button>
</nav>

<!-- FAB -->
<button class="fab" id="main-fab" onclick="fabClick()">＋</button>

<!-- ═══════════════ MODAL: RECIPE FORM ═══════════════ -->
<div class="modal-overlay" id="modal-recipe">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h2 id="recipe-form-title">Neues Rezept</h2>
      <button class="modal-close" onclick="closeModal('modal-recipe')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Titel</label>
        <input class="form-input" id="rf-title" placeholder="z.B. Zürcher Geschnetzeltes">
      </div>
      <div class="form-group">
        <label class="form-label">Fotos</label>
        <div class="photo-zone" id="photo-zone">
          <input type="file" accept="image/*" multiple onchange="handlePhotoUpload(event)">
          <span class="photo-zone-icon">📷</span>
          Foto hinzufügen
        </div>
        <div class="photo-grid" id="photo-preview"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Personen</label>
        <div class="persons-ctrl">
          <button onclick="changePersons(-1)">−</button>
          <span class="persons-val" id="rf-persons-val">4</span>
          <button onclick="changePersons(1)">＋</button>
        </div>
        <input type="hidden" id="rf-persons" value="4">
      </div>
      <div class="form-group">
        <label class="form-label">Kategorie</label>
        <select class="form-select" id="rf-cat">
          <option value="">– keine –</option>
          <option>Frühstück</option><option>Suppe</option><option>Hauptgericht</option>
          <option>Dessert</option><option>Snack</option><option>Backen</option>
          <option>Salat</option><option>Vegetarisch</option><option>Vegan</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">⏱ Vorbereitung</label>
          <div style="display:flex;align-items:center;gap:6px">
            <input class="form-input" id="rf-prep" type="number" min="0" placeholder="0" style="text-align:center">
            <span style="font-size:0.8rem;color:var(--gray);white-space:nowrap">Min.</span>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">🍳 Kochen</label>
          <div style="display:flex;align-items:center;gap:6px">
            <input class="form-input" id="rf-cook" type="number" min="0" placeholder="0" style="text-align:center">
            <span style="font-size:0.8rem;color:var(--gray);white-space:nowrap">Min.</span>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Zutaten</label>
        <div style="display:flex;gap:4px;margin-bottom:6px;">
          <span style="flex:3;font-size:0.72rem;color:var(--gray);font-weight:700">ZUTAT</span>
          <span style="flex:2;font-size:0.72rem;color:var(--gray);font-weight:700">MENGE</span>
          <span style="flex:2;font-size:0.72rem;color:var(--gray);font-weight:700">EINHEIT</span>
          <span style="flex:0 0 34px"></span>
        </div>
        <div id="ingredients-list"></div>
        <button class="add-row-btn" onclick="addIngredientRow()">＋ Zutat hinzufügen</button>
      </div>
      <div class="form-group">
        <label class="form-label">Anleitung</label>
        <textarea class="form-textarea" id="rf-steps" placeholder="Schritte eingeben, je Schritt eine neue Zeile…" style="min-height:120px"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Notizen (optional)</label>
        <textarea class="form-textarea" id="rf-notes" placeholder="Tipps, Variationen…" style="min-height:60px"></textarea>
      </div>
      <button class="btn btn-primary" onclick="saveRecipe()">💾 Speichern</button>
      <div id="rf-delete-wrap" style="margin-top:10px;display:none">
        <button class="btn btn-danger" style="width:100%;justify-content:center" onclick="deleteRecipe()">🗑 Rezept löschen</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════ MODAL: RECIPE DETAIL ═══════════════ -->
<div class="modal-overlay" id="modal-detail">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h2 id="detail-title">Rezept</h2>
      <button class="modal-close" onclick="closeModal('modal-detail')">✕</button>
    </div>
    <div id="detail-body" class="modal-body"></div>

</div>

            <option>🌾 Getreide</option><option>🫘 Hülsenfrüchte</option>
            <option>🫙 Öle & Fette</option><option>🌿 Gewürze</option>
            <option>🌱 Frische Kräuter</option><option>🥫 Saucen</option>
            <option>🥜 Nüsse & Samen</option><option>🍫 Süsses & Backen</option>
            <option>🍞 Brot</option><option>🥤 Getränke</option>
            <option>❄️ Tiefkühl</option><option>🫙 Diverses</option>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// DATA LAYER
// ═══════════════════════════════════════════
const KEY_RECIPES  = 'recipes_v1';
const KEY_PANTRY   = 'pantry_v1';
const KEY_SHOPPING = 'shopping_v1';

function load(key, def) { try { return JSON.parse(localStorage.getItem(key)) || def; } catch { return def; } }
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

let recipes  = load(KEY_RECIPES, []);
let pantry   = load(KEY_PANTRY, []);
let shopping = load(KEY_SHOPPING, { selected: {}, checkedItems: [] });

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
let currentPage = 'recipes';
const titles = { recipes: '🌿 Meine Rezepte', pantry: '🏠 Vorrat', shopping: '🛒 Einkaufsliste', discover: '🔍 Entdecken', foods: '📋 Lebensmittelliste' };

function switchPage(page, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  btn.classList.add('active');
  document.getElementById('page-title').textContent = titles[page];
  currentPage = page;
  if (page === 'recipes') renderRecipes();
  if (page === 'pantry') renderPantry();
  if (page === 'shopping') renderShopping();
  if (page === 'discover') renderDiscover();
  if (page === 'foods') renderFoods();
}

function fabClick() {
  if (currentPage === 'recipes') openRecipeForm();
  else if (currentPage === 'pantry') openPantryForm();
  else if (currentPage === 'shopping') renderShopping();
  else if (currentPage === 'discover') return;
  else if (currentPage === 'foods') openAddFoodModal();
}

// ═══════════════════════════════════════════
// MODALS
// ═══════════════════════════════════════════
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════════
// RECIPES
// ═══════════════════════════════════════════
let editingRecipeId = null;
let currentPhotos = [];

let activeFilter = '';

function setFilter(cat) {
  activeFilter = (activeFilter === cat) ? '' : cat;
  renderRecipes();
}

function renderRecipes() {
  const q = document.getElementById('recipe-search').value.toLowerCase();
  const list = document.getElementById('recipe-list');
  const filtersEl = document.getElementById('recipe-filters');

  // Build filter chips from available categories
  const cats = [...new Set(recipes.map(r => r.cat).filter(Boolean))];
  filtersEl.innerHTML = ['Alle', ...cats].map(c => {
    const active = (c === 'Alle' && !activeFilter) || c === activeFilter;
    return `<button onclick="setFilter('${c === 'Alle' ? '' : c}')"
      style="flex-shrink:0;border:none;border-radius:20px;padding:5px 13px;font-size:0.75rem;font-weight:700;cursor:pointer;font-family:inherit;
        background:${active ? 'var(--olive)' : 'var(--white)'};
        color:${active ? 'white' : 'var(--gray)'};
        box-shadow:var(--shadow)">${c}</button>`;
  }).join('');

  let filtered = recipes.filter(r => {
    const matchQ = r.title.toLowerCase().includes(q) || (r.cat||'').toLowerCase().includes(q);
    const matchCat = !activeFilter || r.cat === activeFilter;
    return matchQ && matchCat;
  });

  if (!filtered.length) {
    list.innerHTML = recipes.length
      ? `<div class="empty"><div class="empty-icon">🔍</div><h3>Keine Treffer</h3><p>Andere Suche oder Filter versuchen.</p></div>`
      : `<div class="empty"><div class="empty-icon">🍽️</div><h3>Noch keine Rezepte</h3><p>Tippe auf <strong>＋</strong> um dein erstes Rezept zu erfassen.</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(r => {
    const img = r.photos && r.photos[0]
      ? `<img src="${r.photos[0]}" style="width:100%;height:150px;object-fit:cover;display:block" alt="${r.title}">`
      : `<div class="recipe-thumb" style="height:100px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;background:var(--olive-pale)">🍳</div>`;
    const totalTime = (r.prepTime || 0) + (r.cookTime || 0);
    const timeBadge = totalTime ? `<span class="badge">⏱ ${totalTime} Min.</span>` : '';
    return `<div class="card" onclick="openRecipeDetail('${r.id}')">
      ${img}
      <div class="recipe-card-body">
        <div class="card-title">${r.title}</div>
        <div class="recipe-meta">
          <span class="badge">👥 ${r.persons} Pers.</span>
          ${r.cat ? `<span class="badge terra">${r.cat}</span>` : ''}
          ${timeBadge}
          <span class="badge">${r.ingredients ? r.ingredients.length : 0} Zutaten</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openRecipeForm(id = null) {
  editingRecipeId = id;
  currentPhotos = [];
  const r = id ? recipes.find(x => x.id === id) : null;
  document.getElementById('recipe-form-title').textContent = r ? 'Rezept bearbeiten' : 'Neues Rezept';
  document.getElementById('rf-title').value = r ? r.title : '';
  document.getElementById('rf-persons').value = r ? r.persons : 4;
  document.getElementById('rf-persons-val').textContent = r ? r.persons : 4;
  document.getElementById('rf-cat').value = r ? (r.cat || '') : '';
  document.getElementById('rf-prep').value = r ? (r.prepTime || '') : '';
  document.getElementById('rf-cook').value = r ? (r.cookTime || '') : '';
  document.getElementById('rf-steps').value = r ? (r.steps || '') : '';
  document.getElementById('rf-notes').value = r ? (r.notes || '') : '';
  document.getElementById('rf-delete-wrap').style.display = r ? 'block' : 'none';
  // photos
  if (r && r.photos) { currentPhotos = [...r.photos]; }
  renderPhotoPreview();
  // ingredients
  const ingList = document.getElementById('ingredients-list');
  ingList.innerHTML = '';
  const ings = r ? r.ingredients : [];
  if (ings && ings.length) ings.forEach(ing => addIngredientRow(ing));
  else addIngredientRow();
  openModal('modal-recipe');
}

function changePersons(d) {
  let v = parseInt(document.getElementById('rf-persons').value) + d;
  v = Math.max(1, v);
  document.getElementById('rf-persons').value = v;
  document.getElementById('rf-persons-val').textContent = v;
}

function handlePhotoUpload(e) {
  const files = Array.from(e.target.files);
  files.forEach(f => {
    const reader = new FileReader();
    reader.onload = ev => { currentPhotos.push(ev.target.result); renderPhotoPreview(); };
    reader.readAsDataURL(f);
  });
}

function renderPhotoPreview() {
  const wrap = document.getElementById('photo-preview');
  wrap.innerHTML = currentPhotos.map((src, i) =>
    `<div class="photo-thumb-wrap">
      <img class="photo-thumb" src="${src}">
      <button class="remove-photo" onclick="removePhoto(${i})">✕</button>
    </div>`
  ).join('');
  document.getElementById('photo-zone').style.display = currentPhotos.length >= 5 ? 'none' : '';
}

function removePhoto(i) { currentPhotos.splice(i, 1); renderPhotoPreview(); }

let ingAcRow = null; // which row is active for autocomplete

function addIngredientRow(ing = null) {
  const units = ['g','kg','ml','l','EL','TL','Stk.','Pkg.','Bund','Dose','Prise','nach Bedarf'];
  const rowId = 'ing-' + Date.now() + Math.random().toString(36).slice(2,6);
  const row = document.createElement('div');
  row.className = 'ing-row';
  row.id = rowId;
  row.innerHTML = `
    <div class="form-group name-col autocomplete-wrap">
      <input class="form-input ing-name-input" placeholder="Zutat" value="${ing ? ing.name : ''}"
        autocomplete="off"
        oninput="ingAcInput(this, '${rowId}')"
        onkeydown="ingAcKeydown(event, '${rowId}')"
        onfocus="ingAcInput(this, '${rowId}')">
      <div class="autocomplete-list ing-ac-list" id="iac-${rowId}" style="display:none"></div>
    </div>
    <div class="form-group amt-col"><input class="form-input" type="number" placeholder="Menge" value="${ing ? ing.amount : ''}"></div>
    <div class="form-group unit-col">
      <select class="form-select">
        ${units.map(u => `<option ${ing && ing.unit===u ? 'selected' : ''}>${u}</option>`).join('')}
      </select>
    </div>
    <div class="add-col"><button class="add-ing-btn" onclick="addIngredientRow()" title="Zeile hinzufügen">＋</button></div>
    <div class="del-col"><button class="del-btn" onclick="removeIngRow('${rowId}')">✕</button></div>
  `;
  document.getElementById('ingredients-list').appendChild(row);
}

function removeIngRow(rowId) {
  const row = document.getElementById(rowId);
  const list = document.getElementById('ingredients-list');
  if (list.querySelectorAll('.ing-row').length <= 1) {
    // keep at least one row, just clear it
    row.querySelector('.ing-name-input').value = '';
    row.querySelector('input[type=number]').value = '';
  } else {
    row.remove();
  }
}

function ingAcInput(input, rowId) {
  const list = document.getElementById('iac-' + rowId);
  const q = input.value.trim().toLowerCase();
  ingAcRow = rowId;
  if (!q) { list.style.display = 'none'; return; }
  const matches = FOODS.filter(f => f.n.toLowerCase().includes(q)).slice(0, 25);
  if (!matches.length) { list.style.display = 'none'; return; }
  list.innerHTML = matches.map((f, i) =>
    `<div class="autocomplete-item" data-idx="${i}" data-name="${f.n}" data-unit="${f.e}"
      onmousedown="ingAcSelect('${rowId}', '${f.n}', '${f.e}')">
      ${f.n}<span class="autocomplete-cat">${f.c}</span>
    </div>`
  ).join('');
  list.style.display = 'block';
}

function ingAcSelect(rowId, name, unit) {
  const row = document.getElementById(rowId);
  row.querySelector('.ing-name-input').value = name;
  const sel = row.querySelector('select');
  // set unit if exists in options
  for (let opt of sel.options) { if (opt.value === unit) { sel.value = unit; break; } }
  document.getElementById('iac-' + rowId).style.display = 'none';
  // focus amount field
  row.querySelector('input[type=number]').focus();
}

function ingAcKeydown(e, rowId) {
  const list = document.getElementById('iac-' + rowId);
  const items = list.querySelectorAll('.autocomplete-item');
  if (!items.length || list.style.display === 'none') {
    if (e.key === 'Enter') { e.preventDefault(); addIngredientRow(); }
    return;
  }
  let cur = list.querySelector('.highlighted');
  let idx = cur ? parseInt(cur.dataset.idx) : -1;
  if (e.key === 'ArrowDown') {
    idx = Math.min(idx + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('highlighted', i === idx));
    e.preventDefault();
  } else if (e.key === 'ArrowUp') {
    idx = Math.max(idx - 1, 0);
    items.forEach((el, i) => el.classList.toggle('highlighted', i === idx));
    e.preventDefault();
  } else if (e.key === 'Enter' && idx >= 0) {
    const item = items[idx];
    ingAcSelect(rowId, item.dataset.name, item.dataset.unit);
    e.preventDefault();
  } else if (e.key === 'Escape') {
    list.style.display = 'none';
  }
}

// close ingredient dropdowns on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.ing-row')) {
    document.querySelectorAll('.ing-ac-list').forEach(l => l.style.display = 'none');
  }
});

function getIngredients() {
  return Array.from(document.querySelectorAll('#ingredients-list .ing-row')).map(row => {
    const inputs = row.querySelectorAll('input, select');
    return { name: inputs[0].value.trim(), amount: inputs[1].value, unit: inputs[2].value };
  }).filter(i => i.name);
}

function saveRecipe() {
  const title = document.getElementById('rf-title').value.trim();
  if (!title) { showToast('Bitte Titel eingeben'); return; }
  const r = {
    id: editingRecipeId || 'r' + Date.now(),
    title,
    persons: parseInt(document.getElementById('rf-persons').value),
    cat: document.getElementById('rf-cat').value,
    prepTime: parseInt(document.getElementById('rf-prep').value) || 0,
    cookTime: parseInt(document.getElementById('rf-cook').value) || 0,
    ingredients: getIngredients(),
    steps: document.getElementById('rf-steps').value.trim(),
    notes: document.getElementById('rf-notes').value.trim(),
    photos: [...currentPhotos],
    created: editingRecipeId ? (recipes.find(x=>x.id===editingRecipeId)||{}).created : Date.now()
  };
  if (editingRecipeId) { const i = recipes.findIndex(x=>x.id===editingRecipeId); recipes[i] = r; }
  else recipes.unshift(r);
  save(KEY_RECIPES, recipes);
  closeModal('modal-recipe');
  renderRecipes();
  showToast('✅ Rezept gespeichert');
}

function deleteRecipe() {
  if (!confirm('Rezept wirklich löschen?')) return;
  recipes = recipes.filter(x => x.id !== editingRecipeId);
  save(KEY_RECIPES, recipes);
  closeModal('modal-recipe');
  renderRecipes();
  showToast('🗑 Gelöscht');
}

let detailRecipeId = null;
let detailPersons = 0;

function openRecipeDetail(id) {
  detailRecipeId = id;
  const r = recipes.find(x => x.id === id);
  if (!r) return;
  detailPersons = r.persons || 4;
  renderDetail();
  openModal('modal-detail');
}

function changeDetailPersons(d) {
  detailPersons = Math.max(1, detailPersons + d);
  renderDetail();
}

function renderDetail() {
  const r = recipes.find(x => x.id === detailRecipeId);
  if (!r) return;
  document.getElementById('detail-title').textContent = r.title;
  const body = document.getElementById('detail-body');
  const steps = (r.steps || '').split('\n').filter(s => s.trim());
  const factor = detailPersons / (r.persons || 1);
  const basePers = r.persons || 1;

  const photoHtml = r.photos && r.photos.length
    ? `<div style="display:flex;gap:8px;overflow-x:auto;margin-bottom:14px;padding-bottom:4px">
        ${r.photos.map(p => `<img src="${p}" style="height:120px;border-radius:10px;flex-shrink:0">`).join('')}
       </div>` : '';

  const totalTime = (r.prepTime||0)+(r.cookTime||0);
  const timeParts = [];
  if (r.prepTime) timeParts.push(`⏱ ${r.prepTime} Min. Vorbereitung`);
  if (r.cookTime) timeParts.push(`🍳 ${r.cookTime} Min. Kochen`);

  const scaling = detailPersons !== basePers
    ? `<span class="badge terra">× ${factor % 1 === 0 ? factor : factor.toFixed(2)}</span>` : '';

  body.innerHTML = `
    ${photoHtml}
    <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center">
      ${r.cat ? `<span class="badge terra">${r.cat}</span>` : ''}
      ${totalTime ? `<span class="badge">⏱ ${totalTime} Min. total</span>` : ''}
    </div>
    ${timeParts.length ? `<div style="font-size:0.78rem;color:var(--gray);margin-bottom:12px">${timeParts.join(' · ')}</div>` : ''}

    <div style="background:var(--olive-pale);border-radius:12px;padding:12px 14px;margin-bottom:14px">
      <div style="font-size:0.72rem;font-weight:800;color:var(--olive);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:8px">Portionen anpassen</div>
      <div style="display:flex;align-items:center;gap:12px">
        <button onclick="changeDetailPersons(-1)" style="width:32px;height:32px;border-radius:50%;background:var(--olive);color:white;border:none;font-size:1.2rem;cursor:pointer;font-weight:700">−</button>
        <span style="font-size:1.1rem;font-weight:800;min-width:80px;text-align:center">${detailPersons} Pers. ${scaling}</span>
        <button onclick="changeDetailPersons(1)" style="width:32px;height:32px;border-radius:50%;background:var(--olive);color:white;border:none;font-size:1.2rem;cursor:pointer;font-weight:700">＋</button>
      </div>
    </div>

    <div class="section-title">Zutaten</div>
    <div class="card" style="margin-bottom:14px">
      ${(r.ingredients||[]).map(i => {
        const amt = parseFloat(i.amount||0) * factor;
        const display = amt === 0 ? '' : (Number.isInteger(amt) ? amt : parseFloat(amt.toFixed(2)));
        return `<div class="ing-list-item">
          <span class="ing-name">${i.name}</span>
          <span class="ing-amount" style="${detailPersons!==basePers?'color:var(--terra);font-weight:700':''}">${display} ${i.unit}</span>
        </div>`;
      }).join('') || '<div class="card-body" style="color:var(--gray)">Keine Zutaten</div>'}
    </div>
    ${steps.length ? `<div class="section-title">Zubereitung</div>
    ${steps.map((s,i) => `<div class="step-item"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></div>`).join('')}` : ''}
    ${r.notes ? `<div class="section-title">Notizen</div><p style="font-size:0.85rem;color:var(--gray);line-height:1.5">${r.notes}</p>` : ''}
    <div style="margin-top:18px;display:flex;flex-direction:column;gap:8px">
      <button class="btn btn-primary" style="justify-content:center" onclick="consumeFromPantry()">🏠 Zutaten vom Vorrat abziehen</button>
      <button class="btn btn-ghost" style="width:100%;justify-content:center" onclick="closeModal('modal-detail');openRecipeForm('${r.id}')">✏️ Bearbeiten</button>
    </div>`;
}

function consumeFromPantry() {
  const r = recipes.find(x => x.id === detailRecipeId);
  if (!r || !r.ingredients || !r.ingredients.length) { showToast('Keine Zutaten im Rezept'); return; }
  const factor = detailPersons / (r.persons || 1);
  let changed = 0, notFound = [];
  r.ingredients.forEach(ing => {
    const needed = parseFloat(ing.amount || 0) * factor;
    const idx = pantry.findIndex(p =>
      p.name.toLowerCase().trim() === ing.name.toLowerCase().trim() && p.unit === ing.unit
    );
    if (idx >= 0) {
      const current = parseFloat(pantry[idx].qty || 0);
      const newQty = Math.max(0, current - needed);
      pantry[idx].qty = parseFloat(newQty.toFixed(3));
      changed++;
    } else {
      notFound.push(ing.name);
    }
  });
  save(KEY_PANTRY, pantry);
  if (changed > 0) {
    showToast('✅ ' + changed + ' Zutaten vom Vorrat abgezogen');
  }
  if (notFound.length) {
    setTimeout(() => showToast('⚠️ Nicht im Vorrat: ' + notFound.slice(0,2).join(', ') + (notFound.length > 2 ? '…' : '')), 2400);
  }
  closeModal('modal-detail');
  if (currentPage === 'pantry') renderPantry();
}

// PANTRY
// ═══════════════════════════════════════════
let editingPantryId = null;

function renderPantry() {
  const q = document.getElementById('pantry-search').value.toLowerCase();
  const list = document.getElementById('pantry-list');
  const today = new Date(); today.setHours(0,0,0,0);

  // Expiry overview banner (always shown when pantry has items)
  const overdue = pantry.filter(p => {
    if (!p.expiry) return false;
    const exp = new Date(p.expiry); exp.setHours(0,0,0,0);
    return exp < today;
  });
  const soonItems = pantry.filter(p => {
    if (!p.expiry) return false;
    const exp = new Date(p.expiry); exp.setHours(0,0,0,0);
    const diff = Math.round((exp - today) / 86400000);
    return diff >= 0 && diff <= 7;
  });

  let bannerHtml = '';
  if (overdue.length || soonItems.length) {
    bannerHtml = `<div style="border-radius:12px;overflow:hidden;margin-bottom:12px">`;
    if (overdue.length) {
      bannerHtml += `<div style="background:#FCE8E8;padding:10px 14px;border-bottom:1px solid #f5c0c0">
        <div style="font-size:0.75rem;font-weight:800;color:var(--red);margin-bottom:4px">⚠️ ABGELAUFEN (${overdue.length})</div>
        ${overdue.map(p => `<div style="font-size:0.82rem;color:var(--red);display:flex;justify-content:space-between">
          <span>${p.name}</span><span>${new Date(p.expiry).toLocaleDateString('de-CH')}</span></div>`).join('')}
      </div>`;
    }
    if (soonItems.length) {
      bannerHtml += `<div style="background:#FEF3DC;padding:10px 14px">
        <div style="font-size:0.75rem;font-weight:800;color:var(--yellow);margin-bottom:4px">⏳ LÄUFT BALD AB (${soonItems.length})</div>
        ${soonItems.map(p => {
          const exp = new Date(p.expiry); exp.setHours(0,0,0,0);
          const diff = Math.round((exp - today) / 86400000);
          return `<div style="font-size:0.82rem;color:#8a6a00;display:flex;justify-content:space-between">
            <span>${p.name}</span><span>in ${diff}d</span></div>`;
        }).join('')}
      </div>`;
    }
    bannerHtml += `</div>`;
  }

  const filtered = pantry.filter(p => p.name.toLowerCase().includes(q));
  if (!filtered.length) {
    list.innerHTML = bannerHtml + `<div class="empty"><div class="empty-icon">🏠</div><h3>Vorrat ist leer</h3><p>Tippe auf <strong>＋</strong> um Vorräte zu erfassen.</p></div>`;
    return;
  }

  filtered.sort((a, b) => {
    if (!a.expiry && !b.expiry) return a.name.localeCompare(b.name);
    if (!a.expiry) return 1; if (!b.expiry) return -1;
    return new Date(a.expiry) - new Date(b.expiry);
  });

  list.innerHTML = bannerHtml + `<div class="card"><div>` +
    filtered.map(p => {
      let expiryHtml = '';
      if (p.expiry) {
        const exp = new Date(p.expiry); exp.setHours(0,0,0,0);
        const diff = Math.round((exp - today) / 86400000);
        if (diff < 0) expiryHtml = `<div class="expiry over">⚠️ Abgelaufen (${Math.abs(diff)}d)</div>`;
        else if (diff <= 3) expiryHtml = `<div class="expiry warn">⏳ Läuft ab in ${diff}d</div>`;
        else if (diff <= 7) expiryHtml = `<div class="expiry warn">⏳ ${exp.toLocaleDateString('de-CH')}</div>`;
        else expiryHtml = `<div class="expiry ok">📅 ${exp.toLocaleDateString('de-CH')}</div>`;
      }
      return `<div class="pantry-item" onclick="openPantryForm('${p.id}')">
        <div>
          <div class="pantry-name">${p.name}</div>
          ${expiryHtml}
        </div>
        <div class="pantry-right">
          <div class="pantry-qty">${p.qty} ${p.unit}</div>
        </div>
      </div>`;
    }).join('') + `</div></div>`;
}

function openPantryForm(id = null) {
  editingPantryId = id;
  const p = id ? pantry.find(x => x.id === id) : null;
  document.getElementById('pantry-form-title').textContent = p ? 'Vorrat bearbeiten' : 'Vorrat hinzufügen';
  document.getElementById('pf-name').value = p ? p.name : '';
  document.getElementById('pf-qty').value = p ? p.qty : '';
  document.getElementById('pf-unit').value = p ? p.unit : 'g';
  document.getElementById('pf-expiry').value = p ? (p.expiry || '') : '';
  document.getElementById('pf-delete-wrap').style.display = p ? 'block' : 'none';
  openModal('modal-pantry');
}

function savePantryItem() {
  const name = document.getElementById('pf-name').value.trim();
  if (!name) { showToast('Bitte Bezeichnung eingeben'); return; }
  const item = {
    id: editingPantryId || 'p' + Date.now(),
    name,
    qty: document.getElementById('pf-qty').value,
    unit: document.getElementById('pf-unit').value,
    expiry: document.getElementById('pf-expiry').value
  };
  if (editingPantryId) { const i = pantry.findIndex(x=>x.id===editingPantryId); pantry[i] = item; }
  else pantry.unshift(item);
  save(KEY_PANTRY, pantry);
  closeModal('modal-pantry');
  renderPantry();
  showToast('✅ Vorrat gespeichert');
}

function deletePantryItem() {
  pantry = pantry.filter(x => x.id !== editingPantryId);
  save(KEY_PANTRY, pantry);
  closeModal('modal-pantry');
  renderPantry();
  showToast('🗑 Gelöscht');
}

// SHOPPING LIST
// ═══════════════════════════════════════════
function renderShopping() {
  const content = document.getElementById('shopping-content');

  // Build selected state
  const sel = shopping.selected || {};

  let recipePart = '';
  if (recipes.length) {
    recipePart = `<div class="section-title">Rezepte auswählen</div>
      <div class="card" style="padding:6px 0"><div class="recipe-selector">` +
      recipes.map(r => `
        <div class="recipe-select-row">
          <input type="checkbox" id="sel-${r.id}" ${sel[r.id] ? 'checked' : ''} onchange="toggleRecipeSel('${r.id}')">
          <label for="sel-${r.id}">${r.title}</label>
          <input type="number" min="1" max="20" value="${sel[r.id] || r.persons}"
            onchange="setPersonCount('${r.id}', this.value)"
            title="Personen" style="${!sel[r.id] ? 'opacity:0.4' : ''}">
        </div>`
      ).join('') +
      `</div></div>
      <button class="btn btn-terra" style="margin-bottom:16px" onclick="generateShoppingList()">🛒 Aus Rezepten erstellen</button>`;
  }

  // Manual add row
  const manualRow = `<div class="section-title">Manuell hinzufügen</div>
    <div class="card" style="padding:12px 14px;margin-bottom:14px;overflow:visible">
      <div style="display:flex;gap:6px;align-items:flex-end;overflow:visible">
        <div style="flex:3;position:relative">
          <input class="form-input" id="sh-manual-name" placeholder="Zutat" autocomplete="off"
            oninput="shAcInput(this.value)" onkeydown="shAcKeydown(event)"
            onfocus="shAcInput(this.value)" style="font-size:0.85rem;padding:8px 10px;width:100%">
          <div class="autocomplete-list" id="sh-ac-list" style="display:none;position:absolute;top:100%;left:0;right:0;z-index:500"></div>
        </div>
        <input class="form-input" id="sh-manual-qty" type="number" placeholder="Menge"
          style="flex:2;font-size:0.85rem;padding:8px 10px">
        <select class="form-select" id="sh-manual-unit" style="flex:2;font-size:0.85rem;padding:8px 10px">
          <option>g</option><option>kg</option><option>ml</option><option>l</option>
          <option>EL</option><option>TL</option><option>Stk.</option><option>Pkg.</option>
          <option>Bund</option><option>Dose</option><option>Prise</option>
        </select>
        <button onclick="addManualShoppingItem()" style="background:var(--olive);color:white;border:none;border-radius:8px;width:36px;height:36px;font-size:1.2rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center">＋</button>
      </div>
    </div>`;

  let html = recipePart + manualRow;

  // Show list
  const hasItems = shopping.items && shopping.items.length;
  if (hasItems) {
    const checked = shopping.checkedItems || [];
    const unchecked = shopping.items.filter(i => !checked.includes(i.key));
    const done = shopping.items.filter(i => checked.includes(i.key));
    html += `<div class="section-title" style="display:flex;justify-content:space-between;align-items:center">
      <span>Einkaufen (${unchecked.length})</span>
      <button onclick="clearShoppingList()" style="background:none;border:none;color:var(--gray);font-size:0.75rem;cursor:pointer;font-weight:700">Liste leeren</button>
    </div>
    <div class="card" style="padding:0">
      ${unchecked.length ? unchecked.map(i => shoppingItemHtml(i, false)).join('') : '<div class="pantry-item" style="color:var(--olive);font-weight:700">✅ Alles erledigt!</div>'}
    </div>`;
    if (done.length) html += `<div class="section-title" style="margin-top:14px">Erledigt (${done.length})</div>
      <div class="card" style="padding:0">${done.map(i => shoppingItemHtml(i, true)).join('')}</div>`;
  } else if (!recipes.length) {
    html += `<div class="empty"><div class="empty-icon">🛒</div><h3>Liste ist leer</h3><p>Füge Zutaten manuell hinzu oder wähle Rezepte aus.</p></div>`;
  }

  content.innerHTML = html;
}

function shoppingItemHtml(item, isChecked) {
  // Show amount+unit; if amount is 0 or missing show only unit (e.g. "Stk." without a number)
  const amt = parseFloat(item.amount);
  const qtyStr = (amt && amt > 0) ? formatAmount(amt) + ' ' + (item.unit || '') : (item.unit || '');
  return `<div class="shopping-item ${isChecked ? 'checked' : ''}">
    <div onclick="toggleShoppingItem('${item.key}')" style="display:flex;align-items:center;gap:12px;flex:1;min-width:0">
      <div class="shopping-check">${isChecked ? '✓' : ''}</div>
      <div class="shopping-name">${item.name}</div>
      <div class="shopping-qty">${qtyStr}</div>
    </div>
    <button onclick="removeShoppingItem('${item.key}')"
      style="background:none;border:none;color:var(--gray);font-size:1rem;cursor:pointer;padding:4px 6px;flex-shrink:0">✕</button>
  </div>`;
}

function addManualShoppingItem() {
  const name = document.getElementById('sh-manual-name').value.trim();
  if (!name) { showToast('Bitte Zutat eingeben'); return; }
  const qty = document.getElementById('sh-manual-qty').value;
  const unit = document.getElementById('sh-manual-unit').value;
  if (!shopping.items) shopping.items = [];
  const key = 'manual_' + name.toLowerCase().replace(/\s/g,'_') + '_' + Date.now();
  const parsedQty = parseFloat(qty);
  shopping.items.push({ name, amount: isNaN(parsedQty) ? null : parsedQty, unit, key, manual: true });
  shopping.items.sort((a,b) => a.name.localeCompare(b.name));
  save(KEY_SHOPPING, shopping);
  document.getElementById('sh-manual-name').value = '';
  document.getElementById('sh-manual-qty').value = '';
  document.getElementById('sh-ac-list').style.display = 'none';
  renderShopping();
  showToast('✅ Hinzugefügt');
}

function removeShoppingItem(key) {
  if (!shopping.items) return;
  shopping.items = shopping.items.filter(i => i.key !== key);
  shopping.checkedItems = (shopping.checkedItems || []).filter(k => k !== key);
  save(KEY_SHOPPING, shopping);
  renderShopping();
}

function clearShoppingList() {
  if (!confirm('Liste wirklich leeren?')) return;
  shopping.items = [];
  shopping.checkedItems = [];
  save(KEY_SHOPPING, shopping);
  renderShopping();
  showToast('🗑 Liste geleert');
}

// Shopping autocomplete
function shAcInput(val) {
  const list = document.getElementById('sh-ac-list');
  const q = val.trim().toLowerCase();
  if (!q) { list.style.display = 'none'; return; }
  const matches = FOODS.filter(f => f.n.toLowerCase().includes(q)).slice(0, 20);
  if (!matches.length) { list.style.display = 'none'; return; }
  list.innerHTML = matches.map(f =>
    `<div class="autocomplete-item" data-name="${f.n}" data-unit="${f.e}"
      onmousedown="shAcSelect('${f.n}','${f.e}')">
      ${f.n}<span class="autocomplete-cat">${f.c}</span>
    </div>`
  ).join('');
  list.style.display = 'block';
}
function shAcSelect(name, unit) {
  document.getElementById('sh-manual-name').value = name;
  document.getElementById('sh-manual-unit').value = unit;
  document.getElementById('sh-ac-list').style.display = 'none';
  document.getElementById('sh-manual-qty').focus();
}
function shAcKeydown(e) {
  const list = document.getElementById('sh-ac-list');
  const items = list.querySelectorAll('.autocomplete-item');
  if (!items.length || list.style.display==='none') {
    if (e.key === 'Enter') addManualShoppingItem();
    return;
  }
  let cur = list.querySelector('.highlighted');
  let idx = cur ? [...items].indexOf(cur) : -1;
  if (e.key==='ArrowDown') { idx=Math.min(idx+1,items.length-1); items.forEach((el,i)=>el.classList.toggle('highlighted',i===idx)); e.preventDefault(); }
  else if (e.key==='ArrowUp') { idx=Math.max(idx-1,0); items.forEach((el,i)=>el.classList.toggle('highlighted',i===idx)); e.preventDefault(); }
  else if (e.key==='Enter' && idx>=0) { const it=items[idx]; shAcSelect(it.dataset.name,it.dataset.unit); e.preventDefault(); }
  else if (e.key==='Escape') list.style.display='none';
}
document.addEventListener('click', e => {
  if (!e.target.closest('#sh-manual-name') && !e.target.closest('#sh-ac-list')) {
    const l = document.getElementById('sh-ac-list');
    if (l) l.style.display = 'none';
  }
});

function formatAmount(n) {
  return Number.isInteger(n) ? n : parseFloat(n.toFixed(2));
}

function toggleRecipeSel(id) {
  const cb = document.getElementById('sel-' + id);
  if (!shopping.selected) shopping.selected = {};
  if (cb.checked) {
    shopping.selected[id] = shopping.selected[id] || recipes.find(r=>r.id===id).persons;
  } else {
    delete shopping.selected[id];
  }
  save(KEY_SHOPPING, shopping);
  renderShopping();
}

function setPersonCount(id, val) {
  if (!shopping.selected) shopping.selected = {};
  shopping.selected[id] = parseInt(val) || 1;
  save(KEY_SHOPPING, shopping);
}

function generateShoppingList() {
  const sel = shopping.selected || {};
  const selectedIds = Object.keys(sel);
  if (!selectedIds.length) { showToast('Bitte mindestens ein Rezept wählen'); return; }

  // Aggregate ingredients
  const aggregate = {};
  selectedIds.forEach(id => {
    const r = recipes.find(x => x.id === id);
    if (!r || !r.ingredients) return;
    const factor = (sel[id] || r.persons) / (r.persons || 1);
    r.ingredients.forEach(ing => {
      const key = ing.name.toLowerCase().trim() + '_' + ing.unit;
      if (!aggregate[key]) aggregate[key] = { name: ing.name, unit: ing.unit, amount: 0, key };
      aggregate[key].amount += parseFloat(ing.amount || 0) * factor;
    });
  });

  // Subtract pantry
  const allItems = Object.values(aggregate);
  allItems.forEach(item => {
    const pantryMatch = pantry.find(p => p.name.toLowerCase().trim() === item.name.toLowerCase().trim() && p.unit === item.unit);
    if (pantryMatch) {
      item.amount = Math.max(0, item.amount - parseFloat(pantryMatch.qty || 0));
      item.fromPantry = parseFloat(pantryMatch.qty || 0);
    }
    // If amount ended up 0 but was never set (no menge in recipe), keep as-is for display
  });

  // Remove items where pantry fully covers the needed amount (amount exactly 0 AND had pantry match)
  // but keep items where amount was 0 to begin with (no menge entered) – those still need buying
  const visibleItems = allItems.filter(item => {
    if (item.fromPantry && item.amount === 0) return false; // fully covered by pantry
    return true;
  });

  shopping.items = visibleItems.sort((a,b) => a.name.localeCompare(b.name));
  shopping.checkedItems = [];
  save(KEY_SHOPPING, shopping);
  renderShopping();
  showToast('🛒 Einkaufsliste erstellt!');
}

function toggleShoppingItem(key) {
  if (!shopping.checkedItems) shopping.checkedItems = [];
  const idx = shopping.checkedItems.indexOf(key);
  if (idx >= 0) shopping.checkedItems.splice(idx, 1);
  else shopping.checkedItems.push(key);
  save(KEY_SHOPPING, shopping);
  renderShopping();
}

// ENTDECKEN – Resteverwertung & Zutatensuche
// ═══════════════════════════════════════════
let discoverMode = 'leftovers'; // 'leftovers' | 'ingredient'
let ingredientSearchTerm = '';

function renderDiscover() {
  const wrap = document.getElementById('discover-content');

  // Tab switcher
  const tabBar = `<div style="display:flex;gap:8px;margin-bottom:14px">
    <button onclick="setDiscoverMode('leftovers')" style="flex:1;border:none;border-radius:10px;padding:10px;font-size:0.82rem;font-weight:700;cursor:pointer;font-family:inherit;
      background:${discoverMode==='leftovers'?'var(--olive)':'var(--white)'};color:${discoverMode==='leftovers'?'white':'var(--gray)'};box-shadow:var(--shadow)">
      🏠 Resteverwertung
    </button>
    <button onclick="setDiscoverMode('ingredient')" style="flex:1;border:none;border-radius:10px;padding:10px;font-size:0.82rem;font-weight:700;cursor:pointer;font-family:inherit;
      background:${discoverMode==='ingredient'?'var(--olive)':'var(--white)'};color:${discoverMode==='ingredient'?'white':'var(--gray)'};box-shadow:var(--shadow)">

    </button>

  wrap.innerHTML = tabBar + '<div id="discover-results"></div>';

function setDiscoverMode(mode) {
  discoverMode = mode;
  renderDiscover();
  if (mode === 'ingredient') {
    setTimeout(() => {
      const inp = document.getElementById('ingredient-search-input');
      if (inp) inp.focus();
    }, 100);
  }
}

function renderDiscoverResults() {
  const res = document.getElementById('discover-results');
  if (discoverMode === 'leftovers') renderLeftovers(res);
  else renderIngredientSearch(res);
}

// ── RESTEVERWERTUNG ──
function renderLeftovers(container) {
  if (!pantry.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🏠</div><h3>Vorrat ist leer</h3>
      <p>Trage zuerst Vorräte ein, dann findest du passende Rezepte.</p></div>`;
    return;
  }
  if (!recipes.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🍽️</div><h3>Noch keine Rezepte</h3>
      <p>Erfasse zuerst Rezepte.</p></div>`;
    return;
  }

  // Score each recipe: how many of its ingredients are covered by pantry
  const pantryNames = pantry.map(p => p.name.toLowerCase().trim());

  const scored = recipes.map(r => {
    const ings = (r.ingredients || []).filter(i => i.name && i.name.trim());
    if (!ings.length) return null;
    const covered = ings.filter(i => pantryNames.includes(i.name.toLowerCase().trim())).length;
    const pct = covered / ings.length;
    return { r, covered, total: ings.length, pct };
  }).filter(x => x && x.pct >= 0.5) // at least 50% covered
    .sort((a, b) => b.pct - a.pct);

  if (!scored.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🤔</div><h3>Keine passenden Rezepte</h3>
      <p>Für kein Rezept sind mindestens 50% der Zutaten im Vorrat vorhanden.</p></div>`;
    return;
  }

  // Group by coverage
  const perfect = scored.filter(x => x.pct === 1);
  const high = scored.filter(x => x.pct >= 0.8 && x.pct < 1);
  const medium = scored.filter(x => x.pct >= 0.5 && x.pct < 0.8);

  let html = '';
  if (perfect.length) html += renderDiscoverGroup('✅ Vollständig vorhanden', perfect, 'var(--olive)');
  if (high.length)    html += renderDiscoverGroup('🟡 Fast komplett (80%+)', high, 'var(--yellow)');
  if (medium.length)  html += renderDiscoverGroup('🟠 Über die Hälfte (50%+)', medium, 'var(--terra)');
  container.innerHTML = html;
}

function renderDiscoverGroup(title, items, color) {
  return `<div class="section-title" style="color:${color}">${title}</div>
  <div class="card" style="padding:0;margin-bottom:12px">
    ${items.map(({r, covered, total, pct}) => {
      const missing = (r.ingredients||[]).filter(i => i.name && !pantry.find(p => p.name.toLowerCase().trim() === i.name.toLowerCase().trim()));
      const pctInt = Math.round(pct * 100);
      const bar = `<div style="height:4px;background:var(--gray-light);border-radius:4px;margin-top:6px;overflow:hidden">
        <div style="height:100%;width:${pctInt}%;background:${color};border-radius:4px;transition:width 0.3s"></div></div>`;
      const missingHtml = missing.length
        ? `<div style="font-size:0.7rem;color:var(--gray);margin-top:3px">Fehlt: ${missing.map(i=>i.name).join(', ')}</div>`
        : '';
      const totalTime = (r.prepTime||0)+(r.cookTime||0);
      return `<div style="padding:12px 14px;border-bottom:1px solid var(--gray-light);cursor:pointer"
        onclick="openRecipeDetail('${r.id}')">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
          <div style="font-size:0.9rem;font-weight:700;flex:1">${r.title}</div>
          <span style="font-size:0.75rem;font-weight:800;color:${color};flex-shrink:0">${pctInt}%</span>
        </div>
        <div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap">
          <span class="badge">👥 ${r.persons} Pers.</span>
          ${r.cat ? `<span class="badge terra">${r.cat}</span>` : ''}
          ${totalTime ? `<span class="badge">⏱ ${totalTime} Min.</span>` : ''}
          <span class="badge">${covered}/${total} Zutaten</span>
        </div>
        ${bar}
        ${missingHtml}
      </div>`;
    }).join('')}
  </div>`;
}

// ── ZUTAT SUCHEN ──
function renderIngredientSearch(container) {
  const acHtml = `<div class="autocomplete-wrap" style="margin-bottom:14px">
    <input class="search-bar" id="ingredient-search-input" placeholder="🔍 Zutat eingeben…"
      style="margin-bottom:0" autocomplete="off"
      value="${ingredientSearchTerm}"
      oninput="ingredientSearchTerm=this.value;ingSearchAcInput(this.value)"
      onkeydown="ingSearchKeydown(event)"
      onfocus="ingSearchAcInput(this.value)">
    <div class="autocomplete-list" id="ing-search-ac-list" style="display:none"></div>
  </div>
  <div id="ing-search-results"></div>`;

  container.innerHTML = acHtml;
  if (ingredientSearchTerm) renderIngredientResults();
}

function ingSearchAcInput(val) {
  const list = document.getElementById('ing-search-ac-list');
  const q = val.trim().toLowerCase();
  if (!q) { list.style.display='none'; return; }
  const matches = FOODS.filter(f => f.n.toLowerCase().includes(q)).slice(0,20);
  // also add pantry items
  const pantryMatches = pantry.filter(p => p.name.toLowerCase().includes(q) && !matches.find(f=>f.n.toLowerCase()===p.name.toLowerCase()));
  const all = [...matches.map(f=>f.n), ...pantryMatches.map(p=>p.name)].slice(0,25);
  if (!all.length) { list.style.display='none'; return; }
  list.innerHTML = all.map(name =>
    `<div class="autocomplete-item" onmousedown="selectIngredientSearch('${name.replace(/'/g,"\'")}')">
      ${name}
    </div>`
  ).join('');
  list.style.display = 'block';
}

function ingSearchKeydown(e) {
  const list = document.getElementById('ing-search-ac-list');
  const items = list ? list.querySelectorAll('.autocomplete-item') : [];
  if (e.key === 'Enter' && (!items.length || list.style.display==='none')) {
    document.getElementById('ing-search-ac-list').style.display='none';
    renderIngredientResults();
    return;
  }
  let cur = list ? list.querySelector('.highlighted') : null;
  let idx = cur ? [...items].indexOf(cur) : -1;
  if (e.key==='ArrowDown') { idx=Math.min(idx+1,items.length-1); items.forEach((el,i)=>el.classList.toggle('highlighted',i===idx)); e.preventDefault(); }
  else if (e.key==='ArrowUp') { idx=Math.max(idx-1,0); items.forEach((el,i)=>el.classList.toggle('highlighted',i===idx)); e.preventDefault(); }
  else if (e.key==='Enter' && idx>=0) { selectIngredientSearch(items[idx].textContent.trim()); e.preventDefault(); }
  else if (e.key==='Escape') list.style.display='none';
}

function selectIngredientSearch(name) {
  ingredientSearchTerm = name;
  const inp = document.getElementById('ingredient-search-input');
  if (inp) inp.value = name;
  const list = document.getElementById('ing-search-ac-list');
  if (list) list.style.display = 'none';
  renderIngredientResults();
}

function renderIngredientResults() {
  const res = document.getElementById('ing-search-results');
  if (!res) return;
  const q = ingredientSearchTerm.trim().toLowerCase();
  if (!q) { res.innerHTML = ''; return; }

  const matched = recipes.filter(r =>
    (r.ingredients||[]).some(i => i.name && i.name.toLowerCase().includes(q))
  );

  if (!matched.length) {
    res.innerHTML = `<div class="empty" style="padding:24px 0"><div class="empty-icon" style="font-size:2rem">🔍</div>
      <h3>Keine Rezepte gefunden</h3>
      <p>Kein Rezept enthält «${ingredientSearchTerm}».</p></div>`;
    return;
  }

  res.innerHTML = `<div class="section-title">${matched.length} Rezept${matched.length!==1?'e':''} mit «${ingredientSearchTerm}»</div>
  <div class="card" style="padding:0">
    ${matched.map(r => {
      const matchedIngs = (r.ingredients||[]).filter(i => i.name && i.name.toLowerCase().includes(q));
      const totalTime = (r.prepTime||0)+(r.cookTime||0);
      return `<div style="padding:12px 14px;border-bottom:1px solid var(--gray-light);cursor:pointer" onclick="openRecipeDetail('${r.id}')">
        <div style="font-size:0.9rem;font-weight:700;margin-bottom:4px">${r.title}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px">
          <span class="badge">👥 ${r.persons} Pers.</span>
          ${r.cat?`<span class="badge terra">${r.cat}</span>`:''}
          ${totalTime?`<span class="badge">⏱ ${totalTime} Min.</span>`:''}
        </div>
        <div style="font-size:0.75rem;color:var(--olive);font-weight:600">
          ${matchedIngs.map(i=>`${i.name}${i.amount?' ('+i.amount+' '+i.unit+')':''}`).join(' · ')}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

// close ing search autocomplete on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('#ingredient-search-input') && !e.target.closest('#ing-search-ac-list')) {
    const l = document.getElementById('ing-search-ac-list');
    if (l) l.style.display = 'none';
  }
});

// Merge custom foods into FOODS on load
function rebuildFoods() {
  FOODS = FOODS.filter(f => !f.custom);
  customFoods.forEach(f => FOODS.push({...f, custom: true}));
  // Apply unit overrides to all foods
  FOODS.forEach(f => { if (unitOverrides[f.n]) f.e = unitOverrides[f.n]; });
  FOODS.sort((a,b) => a.n.localeCompare(b.n));
}
rebuildFoods();

// ═══════════════════════════════════════════
// LEBENSMITTELLISTE VERWALTEN
// ═══════════════════════════════════════════
const FOOD_CATS = ['🥦 Gemüse','🍎 Früchte','🥩 Fleisch & Fisch','🧀 Milch & Eier','🌾 Getreide','🫘 Hülsenfrüchte','🫙 Öle & Fette','🌿 Gewürze','🌱 Frische Kräuter','🥫 Saucen','🥜 Nüsse & Samen','🍫 Süsses & Backen','🍞 Brot','🥤 Getränke','❄️ Tiefkühl','🫙 Diverses','⭐ Eigene'];

const ALL_UNITS = ['g','kg','ml','l','EL','TL','Stk.','Pkg.','Bund','Dose','Prise','nach Bedarf'];

function unitSelect(foodName, currentUnit) {
  const escaped = foodName.replace(/'/g, "\'");
  return `<select class="form-select" style="font-size:0.75rem;padding:4px 6px;border-radius:6px;width:80px"
    onchange="saveFoodUnit('${escaped}', this.value)">
    ${ALL_UNITS.map(u => `<option ${u===currentUnit?'selected':''}>${u}</option>`).join('')}
  </select>`;
}

function saveFoodUnit(foodName, unit) {
  unitOverrides[foodName] = unit;
  save(KEY_UNIT_OVERRIDES, unitOverrides);
  rebuildFoods();
  showToast('✅ Einheit gespeichert');
}

function renderFoods() {
  const wrap = document.getElementById('foods-content');
  const custom = customFoods;
  const grouped = {};
  FOODS.forEach(f => {
    if (!grouped[f.c]) grouped[f.c] = [];
    grouped[f.c].push(f);
  });

  let html = `<p style="font-size:0.78rem;color:var(--gray);margin-bottom:12px;line-height:1.5">
    Einheit anpassen: Die gewählte Einheit wird als Standard bei Vorrat und Rezepten vorausgewählt.</p>`;

  if (custom.length) {
    html += `<div class="section-title">⭐ Eigene Lebensmittel</div>
    <div class="card" style="padding:0">`;
    custom.forEach((f,i) => {
      html += `<div class="pantry-item">
        <div style="flex:1;min-width:0"><div class="pantry-name">${f.n}</div><div class="pantry-detail">${f.c}</div></div>
        <div style="display:flex;align-items:center;gap:6px">
          ${unitSelect(f.n, f.e)}
          <button class="del-btn" style="width:28px;height:28px;font-size:0.75rem" onclick="deleteCustomFood(${i})">✕</button>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  html += `<div class="section-title" style="margin-top:${custom.length?'14px':'0'}">Alle Lebensmittel (${FOODS.length})</div>`;
  Object.entries(grouped).forEach(([cat, items]) => {
    html += `<div class="section-title" style="font-size:0.65rem;margin-top:10px">${cat}</div>
    <div class="card" style="padding:0;margin-bottom:4px">`;
    items.forEach(f => {
      const isOverridden = !!unitOverrides[f.n];
      html += `<div class="pantry-item" style="padding:8px 12px">
        <div class="pantry-name" style="font-size:0.85rem;flex:1">${f.n}${isOverridden ? ' <span style="color:var(--olive);font-size:0.65rem">✎</span>' : ''}</div>
        ${unitSelect(f.n, f.e)}
      </div>`;
    });
    html += `</div>`;
  });

  wrap.innerHTML = html;
}

function openAddFoodModal() {
  document.getElementById('af-name').value = '';
  document.getElementById('af-unit').value = 'g';
  document.getElementById('af-cat').value = '⭐ Eigene';
  openModal('modal-add-food');
  setTimeout(() => document.getElementById('af-name').focus(), 300);
}

function saveCustomFood() {
  const name = document.getElementById('af-name').value.trim();
  if (!name) { showToast('Bitte Name eingeben'); return; }
  const food = {
    n: name,
    e: document.getElementById('af-unit').value,
    c: document.getElementById('af-cat').value
  };
  // avoid duplicate
  if (FOODS.find(f => f.n.toLowerCase() === name.toLowerCase())) {
    showToast('Lebensmittel existiert bereits'); return;
  }
  customFoods.push(food);
  save(KEY_CUSTOM_FOODS, customFoods);
  rebuildFoods();
  closeModal('modal-add-food');
  renderFoods();
  showToast('✅ Lebensmittel hinzugefügt');
}

function deleteCustomFood(idx) {
  customFoods.splice(idx, 1);
  save(KEY_CUSTOM_FOODS, customFoods);
  rebuildFoods();
  renderFoods();
  showToast('🗑 Gelöscht');
}

// ═══════════════════════════════════════════
// AUTOCOMPLETE LOGIC
// ═══════════════════════════════════════════
let acIndex = -1;

function acInput(val) {
  const list = document.getElementById('ac-list');
  const q = val.trim().toLowerCase();
  if (!q) { list.style.display = 'none'; return; }
  const matches = FOODS.filter(f => f.n.toLowerCase().includes(q)).slice(0, 30);
  if (!matches.length) { list.style.display = 'none'; return; }
  acIndex = -1;
  list.innerHTML = matches.map((f, i) =>
    `<div class="autocomplete-item" data-idx="${i}" data-name="${f.n}" data-unit="${f.e}"
      onmousedown="acSelect('${f.n}','${f.e}')">
      ${f.n}<span class="autocomplete-cat">${f.c}</span>
    </div>`
  ).join('');
  list.style.display = 'block';
}

function acSelect(name, unit) {
  document.getElementById('pf-name').value = name;
  document.getElementById('pf-unit').value = unit;
  document.getElementById('ac-list').style.display = 'none';
}

function acKeydown(e) {
  const list = document.getElementById('ac-list');
  const items = list.querySelectorAll('.autocomplete-item');
  if (!items.length) return;
  if (e.key === 'ArrowDown') {
    acIndex = Math.min(acIndex + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('highlighted', i === acIndex));
    e.preventDefault();
  } else if (e.key === 'ArrowUp') {
    acIndex = Math.max(acIndex - 1, 0);
    items.forEach((el, i) => el.classList.toggle('highlighted', i === acIndex));
    e.preventDefault();
  } else if (e.key === 'Enter' && acIndex >= 0) {
    const item = items[acIndex];
    acSelect(item.dataset.name, item.dataset.unit);
    e.preventDefault();
  } else if (e.key === 'Escape') {
    list.style.display = 'none';
  }
}

document.addEventListener('click', e => {
  if (!e.target.closest('.autocomplete-wrap')) {
    const list = document.getElementById('ac-list');
    if (list) list.style.display = 'none';
  }
});
